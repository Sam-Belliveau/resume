name: Build Resumes

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [swe, robotics, research]
    steps:
      - uses: actions/checkout@v4
      - uses: typst-community/setup-typst@v5
        with:
          typst-version: "0.14.2"
      - name: Compile ${{ matrix.variant }}
        run: >
          typst compile --root . --font-path fonts
          --input draft=false
          variants/${{ matrix.variant }}.typ
          Sam-Belliveau-${{ matrix.variant }}.pdf
      - uses: actions/upload-artifact@v4
        with:
          name: Sam-Belliveau-${{ matrix.variant }}
          path: Sam-Belliveau-${{ matrix.variant }}.pdf

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.pdf
